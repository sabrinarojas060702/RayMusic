<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador de Música - Severo Rojas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="imagenes/reproductor-de-musica.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1 class="titulopagins"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#B0AEF5"><path d="M287-167q-47-47-47-113t47-113q47-47 113-47 23 0 42.5 5.5T480-418v-422h240v160H560v400q0 66-47 113t-113 47q-66 0-113-47Z"/></svg>RayMusic</h1>
            <h1 class="title">
                Hola <span class="name-blue">Severo</span> <span class="name-purple">Rojas</span>
            </h1>
            
            <p class="subtitle">Que música vamos a descargar hoy?</p>
            
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Inserte la música que se va a descargar..."
                    id="searchInput"
                    autocomplete="off"
                >
                <button class="search-button" id="searchButton">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="foto"></div>
    </div>
    
    <!-- Modal de resultados -->
    <div id="resultsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Resultados de búsqueda</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div id="modalResults" class="modal-results"></div>
        </div>
    </div>
    
    <!-- Cargar configuración y aplicación -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
