# Configuración completa de Render para RayMusic
services:
  - type: web
    name: raymusic
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /health_check.php
    
    # Variables de entorno
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
        # ⚠️ IMPORTANTE: Configura esto en el panel de Render
        # Settings > Environment > Add Variable
        
      - key: PHP_MEMORY_LIMIT
        value: 256M
        
      - key: MAX_EXECUTION_TIME
        value: 300
        
      - key: UPLOAD_MAX_FILESIZE
        value: 50M
        
      - key: POST_MAX_SIZE
        value: 50M
    
    # Auto-deploy desde Git
    autoDeploy: true
    
    # Configuración de build
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    
    # Configuración de recursos
    disk:
      name: raymusic-data
      mountPath: /tmp
      sizeGB: 1
